{% set version = "2.2.2" %}

package:
  name: pytest-services
  version: {{ version }}

source:
  - folder: dist
    url: https://pypi.org/packages/source/p/pytest-services/pytest_services-{{ version }}.tar.gz
    sha256: 3388f45e66bba81cefc060273306d7e1eb0005d9303af993211fa9ae667534fd
  - folder: src
    url: https://github.com/pytest-dev/pytest-services/archive/v{{ version }}.tar.gz
    sha256: e40fedb17da3214421f04b6af637e5a968cf3b1c778799e39d2a3fcbd599d29a

build:
  noarch: python
  number: 0
  script:
    - cd dist
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - psutil
    - pytest
    - python >={{ python_min }}
    - requests
    - setuptools
    - zc.lockfile >=2.0

test:
  source_files:
    - src/tests
  requires:
    - astroid
    - coverage
    - mock
    - mysqlclient  # [unix]
    - pip
    - pylibmc  # [unix]
    - pytest-pep8
    - python {{ python_min }}
  imports:
    - pytest_services
  commands:
    - pip check
    - cd src
    - pytest -vv -k "not xvfb and not mysql and not memcached"  # [unix]

about:
  home: https://github.com/pytest-dev/pytest-services
  license: MIT
  license_family: MIT
  license_file: src/LICENSE.txt
  summary: Collection of fixtures and utility functions to run service processes for your tests

extra:
  recipe-maintainers:
    - bollwyvl
